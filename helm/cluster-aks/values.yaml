# Default values for cluster-aks.
#
# This chart provisions an AKS (Azure Kubernetes Service) workload cluster
# through Cluster API using the Azure provider (CAPZ).
#
# It composes with the upstream giantswarm/cluster chart (declared as a
# dependency in Chart.yaml). The cluster chart owns all the provider-agnostic
# CAPI resources (Cluster, MachinePool, MachineHealthCheck, ...). This chart
# owns the CAPZ-specific resources (AzureASOManagedCluster,
# AzureASOManagedControlPlane, AzureASOManagedMachinePool). The new ASO-based
# CRDs embed Azure Service Operator (ASO) resources (ResourceGroup,
# ManagedCluster, ManagedClustersAgentPool) directly under `spec.resources`,
# and Azure credentials are referenced via a Kubernetes Secret using the
# `serviceoperator.azure.com/credential-from` annotation.

# Configuration passed to the giantswarm/cluster subchart. The
# `providerIntegration` block is the contract between provider charts and the
# cluster chart — it tells the subchart how to wire CAPI resources to our
# AKS-specific CRs.
cluster:
  providerIntegration:
    apps:
      certExporter:
        enable: true
      certManager:
        configTemplateName: AKSCertManagerHelmValues
        enable: true
      chartOperatorExtensions:
        enable: true
      cilium:
        enable: false # Already managed by AKS
      ciliumServiceMonitors:
        enable: true
      clusterAutoscaler:
        enable: false
      coreDns:
        enable: false # Already managed by AKS
      coreDnsExtensions:
        enable: false # Already managed by AKS
      externalDns:
        configTemplateName: AKSExternalDnsHelmValues
        enable: true
      k8sDnsNodeCache:
        enable: true
      metricsServer:
        enable: false # Already managed by AKS
      netExporter:
        enable: true
      networkPolicies:
        configTemplateName: AKSNetworkPoliciesHelmValues
        enable: true
      nodeExporter:
        enable: true
      observabilityBundle:
        configTemplateName: AKSObservabilityBundleHelmValues
        enable: true
      observabilityPolicies:
        enable: true
      priorityClasses:
        enable: true
      rbacBootstrap:
        enable: true
      securityBundle:
        configTemplateName: AKSSecurityBundleHelmValues
        enable: true
      teleportKubeAgent:
        configTemplateName: AKSTeleportKubeAgentHelmValues
        enable: true
      verticalPodAutoscaler:
        configTemplateName: AKSVerticalPodAutoscalerHelmValues
        enable: true
      verticalPodAutoscalerCrd:
        enable: true

    provider: aks

    # Named template (defined in this chart) that renders annotations placed
    # on the Cluster CR by the cluster subchart.
    clusterAnnotationsTemplateName: azureClusterAnnotations

    pauseProperties: {}

    useReleases: true

    resourcesApi:
      bastionResourceEnabled: false
      cleanupHelmReleaseResourcesEnabled: false
      clusterResourceEnabled: true
      helmRepositoryResourcesEnabled: true
      externalAutoscaler:
        enabled: false

      # AKS manages the control plane externally; we don't render a
      # KubeadmControlPlane or KamajiControlPlane. The Cluster CR's
      # controlPlaneRef still points at AzureManagedControlPlane (see below).
      controlPlaneResource:
        enabled: true
        provider: external

      # AKS clusters do not need MachineHealthChecks — AKS itself handles
      # node remediation for managed node pools.
      machineHealthCheckResourceEnabled: false

      # The Cluster.spec.infrastructureRef points at AzureASOManagedCluster.
      infrastructureCluster:
        group: infrastructure.cluster.x-k8s.io
        kind: AzureASOManagedCluster
        version: v1beta1

      # Worker node pools are rendered as CAPI MachinePool resources whose
      # infrastructureRef points at AzureASOManagedMachinePool.
      machinePoolResourcesEnabled: true
      nodePoolKind: MachinePool
      infrastructureMachinePool:
        group: infrastructure.cluster.x-k8s.io
        kind: AzureASOManagedMachinePool
        version: v1beta1

      # Externally-managed bootstrap: AKS provisions kubelet on its own, so
      # the wrapping MachinePool needs an empty dataSecretName instead of a
      # KubeadmConfig configRef. The named template is defined in this
      # chart's templates/_helpers.tpl.
      machinePool:
        bootstrap:
          templateName: azureMachinePoolBootstrap

    controlPlane:
      resources:
        # Cluster.spec.controlPlaneRef → AzureASOManagedControlPlane.
        controlPlane:
          api:
            group: infrastructure.cluster.x-k8s.io
            kind: AzureASOManagedControlPlane
            version: v1beta1
        # Required by the cluster subchart schema but unused for AKS because
        # the KubeadmControlPlane template is gated on provider == "kubeadm".
        infrastructureMachineTemplate:
          group: infrastructure.cluster.x-k8s.io
          kind: AzureASOManagedControlPlane
          version: v1beta1
        infrastructureMachineTemplateSpecTemplateName: noop

    # Workers do not use KubeadmConfig (AKS handles bootstrap).
    workers:
      kubeadmConfig:
        enabled: false
      defaultNodePools:
        system:
          mode: System
          vmSize: Standard_D2s_v3
          minSize: 1
          maxSize: 2
          enableAutoScaling: true
          osDiskSizeGB: 128
          osDiskType: Managed
          osType: Linux
          availabilityZones:
            - "1"
            - "2"
            - "3"
        workers:
          mode: User
          vmSize: Standard_D2s_v3
          minSize: 1
          maxSize: 2
          enableAutoScaling: true
          osDiskSizeGB: 128
          osDiskType: Managed
          osType: Linux
          availabilityZones:
            - "1"
            - "2"
            - "3"

# User-facing values. These are the knobs end users tune.
#
# Helm shares the `global` key between this chart and its subcharts, so the
# fields below are visible inside the giantswarm/cluster subchart as well.
global:
  # Name of the management cluster that manages this workload cluster.
  # Required by the cluster subchart.
  managementCluster: ""

  metadata:
    # Name of the workload cluster. Defaults to the Helm release name when
    # unset. Must comply with Azure resource naming rules.
    name: ""
    description: ""
    organization: ""
    preventDeletion: false
    servicePriority: highest
    labels: {}
    annotations: {}

  connectivity:
    # DNS base domain used by the management cluster's installation. AKS
    # exposes its API server through a *.azmk8s.io hostname; this value is
    # consumed by the cluster subchart for labels/annotations only.
    baseDomain: ""

    network:
      # Must be within the service CIDR
      dnsServiceIP: 172.20.0.10
      # Services CIDR — assigned by AKS for Kubernetes Service IPs. Used to
      # populate Cluster.spec.clusterNetwork.services.
      services:
        cidrBlocks:
          - 172.20.0.0/16
      # Pods CIDR — only used by AKS when `controlPlane.networking.networkPlugin`
      # is `kubenet`. Ignored for Azure CNI (both node-subnet and overlay
      # modes); in node-subnet mode pods get IPs from `vnet.subnet.cidrBlocks`.
      # Kept non-empty because the giantswarm/cluster subchart schema
      # requires at least one entry.
      pods:
        cidrBlocks:
          - 192.168.0.0/16

      # VNet for the cluster's node pools.
      #
      # By default the chart creates an Azure VirtualNetwork (via ASO)
      # with one subnet inside it, and wires every node pool to that
      # subnet (Azure CNI node-subnet mode — pods get IPs from the
      # subnet's CIDR).
      #
      # To bring your own VNet, set `subnetArmId` to the ARM ID of an
      # existing subnet. When set, the chart does NOT create a VNet
      # and every node pool references the provided subnet instead;
      # `cidrBlocks`, `name`, and `subnet.*` are then ignored.
      vnet:
        # ARM ID of an existing subnet to use for all node pools. When
        # set, the chart skips VNet/Subnet creation. Format:
        # /subscriptions/<sub>/resourceGroups/<rg>/providers/Microsoft.Network/virtualNetworks/<vnet>/subnets/<subnet>
        subnetArmId: ""
        # CIDR(s) of the chart-created VirtualNetwork's address space.
        cidrBlocks:
          - 10.224.0.0/12
        # Name of the chart-created VirtualNetwork. Defaults to the
        # cluster name when empty.
        name: ""
        subnet:
          # CIDR of the chart-created subnet. Must lie within
          # vnet.cidrBlocks.
          cidrBlocks:
            - 10.224.0.0/16
          # Name of the chart-created subnet (Azure resource name).
          name: nodes

    # Optional API server access controls (AKS public/private cluster).
    apiServerAccess:
      # When true, the AKS API server is reachable only from inside the
      # VNet (or via authorizedIPRanges).
      enablePrivateCluster: false
      privateDNSZone: ""
      enablePrivateClusterPublicFQDN: false
      authorizedIPRanges: []

  controlPlane:
    # AKS SKU tier.
    sku:
      # Allowed: Free | Premium | Standard
      tier: Standard

    # DNS prefix. Defaults to the cluster name when empty.
    dnsPrefix: ""

    # AKS networking
    networking:
      # Allowed: loadBalancer, managedNATGateway, userAssignedNATGateway, userDefinedRouting
      outboundType: loadBalancer
      # Allowed: azure | cilium
      networkDataplane: cilium
      # Allowed: azure | kubenet.
      networkPlugin: azure
      networkMode: transparent
      # Allowed: azure, calico, cilium, none
      networkPolicy: cilium

    # AAD integration. When `managed: true`, AKS uses AAD for k8s API auth.
    aadProfile: {}

    # Auto-upgrade channel: none | patch | rapid | stable | node-image
    autoUpgradeChannel: none

    # Additional Azure tags applied to the underlying AKS resources.
    additionalTags: {}

  providerSpecific:
    # Azure subscription that hosts the AKS cluster.
    subscriptionId: ""

    # Azure region (e.g. westeurope, eastus).
    location: ""

    # Resource group that contains the AKS cluster. Defaults to the cluster
    # name when empty. CAPZ creates the RG if it does not exist.
    resourceGroupName: ""

    asoAuthentication:
      subscriptionID: ""
      tenantID: ""
      clientID: ""

    # Identity assigned to the AKS control plane itself (separate from the
    # CAPZ controller identity above).
    # Allowed types: SystemAssigned | UserAssigned
    controlPlaneIdentity:
      type: SystemAssigned
      userAssignedIdentityResourceID: ""

    # User-assigned identity used by the kubelet (typically for ACR pulls).
    kubeletIdentityResourceID: ""

internal:
  defaults:
    evictionMinimumReclaim: imagefs.available=5%,memory.available=100Mi,nodefs.available=5%
    hardEvictionThresholds: memory.available<200Mi,nodefs.available<10%,nodefs.inodesFree<3%,imagefs.available<10%,pid.available<20%
    softEvictionGracePeriod: memory.available=30s,nodefs.available=2m,nodefs.inodesFree=1m,imagefs.available=2m,pid.available=1m
    softEvictionThresholds: memory.available<500Mi,nodefs.available<15%,nodefs.inodesFree<5%,imagefs.available<15%,pid.available<30%
  enableVpaResources: true
  network:
    vnet: {}
    vpn:
      gatewayMode: none
  kubectlImage:
    name: giantswarm/docker-kubectl
    registry: gsoci.azurecr.io
    tag: "1.36.1"
  sandboxContainerImage:
    name: giantswarm/pause
    registry: gsoci.azurecr.io
    tag: "3.9"
  teleport:
    enabled: true
    proxyAddr: teleport.giantswarm.io:443
    version: 14.1.3
