{{/* Azure-specific cert-manager Helm values*/}}
{{/* https://github.com/giantswarm/cert-manager-app/blob/main/helm/cert-manager/values.yaml*/}}
{{- define "AKSCertManagerHelmValues" }}
ciliumNetworkPolicy:
  enabled: true
webhook:
  mutatingWebhookConfigurationAnnotations:
    # prevent AKS from overriding the VPA webhook configuration
    admissions.enforcer/disabled: "true"
{{- end }}
